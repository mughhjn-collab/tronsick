name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Upload changed files via curl FTP
        env:
          FTP_USER: u895912460
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: 153.92.11.34
          FTP_DIR: /domains/tronsick.io/public_html
        run: |
          # Get changed files
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD)

          # Filter: only site files, skip scripts/data
          FILTERED=$(echo "$CHANGED" | grep -E '\.(php|js|css|html)$' \
            | grep -v '^\.github/' \
            | grep -v '^fix_' \
            | grep -v '^append_' \
            | grep -v '^rename_' \
            | grep -v '^push\.js' \
            | grep -v '^bump_' \
            | grep -v '^verify_' \
            | grep -v '^deploy_' \
            | grep -v '^add_')

          echo "=== Files to upload ==="
          echo "$FILTERED"
          echo "======================"

          if [ -z "$FILTERED" ]; then
            echo "No files to upload."
            exit 0
          fi

          SUCCESS=0
          FAIL=0
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              REMOTE="ftp://$FTP_HOST$FTP_DIR/$file"
              echo "Uploading: $file -> $REMOTE"
              curl --silent --show-error \
                --user "$FTP_USER:$FTP_PASS" \
                --ftp-ssl-control \
                --ssl-no-revoke \
                --insecure \
                --ftp-create-dirs \
                --upload-file "$file" \
                "$REMOTE" \
                && { echo "  ✓ $file"; SUCCESS=$((SUCCESS+1)); } \
                || { echo "  ✗ $file FAILED"; FAIL=$((FAIL+1)); }
            fi
          done <<< "$FILTERED"

          echo ""
          echo "=== Upload Summary ==="
          echo "Success: $SUCCESS | Failed: $FAIL"
          if [ $FAIL -gt 0 ]; then exit 1; fi
