name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 153.92.11.34
          username: u895912460
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: /domains/tronsick.io/public_html/
          timeout: 60000
          log-level: standard
          dangerous-clean-slate: false
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/fix_*.js
            **/append_*.js
            **/rename_*.js
            **/add_*.js
            **/verify_*.js
            **/deploy_*.js
            **/push.js
            **/bump_version.ps1
            **/data/users.json
            **/data/contest_wagers.json
            **/data/antibot.json
            **/data/site_settings.json
            **/data/gen_payouts.json
