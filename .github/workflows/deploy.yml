name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 15

      - name: Upload changed files via curl FTP
        env:
          FTP_USER: u895912460
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: 153.92.11.34
          FTP_DIR: /domains/tronsick.io/public_html
        run: |
          # Manual dispatch = last 10 commits, auto push = last 1 commit
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            CHANGED=$(git diff --name-only HEAD~10 HEAD 2>/dev/null || echo "")
            echo "Manual dispatch: checking last 10 commits"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --format="" HEAD 2>/dev/null || echo "")
            echo "Push event: checking last 1 commit"
          fi

          FILTERED=$(echo "$CHANGED" \
            | grep -E '\.(php|js|css|html)$' \
            | grep -v '^\.github/' \
            | grep -v '^fix_' \
            | grep -v '^append_' \
            | grep -v '^push\.js' \
            | grep -v '^bump_' \
            | grep -v '^verify_' \
            | grep -v '^deploy_' \
            | grep -v '^add_' \
            || echo "")

          echo "=== Files to upload ==="
          echo "$FILTERED"
          echo "======================"

          if [ -z "$(echo "$FILTERED" | tr -d '[:space:]')" ]; then
            echo "No site files changed. Nothing to upload."
            exit 0
          fi

          SUCCESS=0
          FAIL=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            echo "Uploading: $file"
            if curl -s -S \
              --user "$FTP_USER:$FTP_PASS" \
              --upload-file "$file" \
              --ftp-create-dirs \
              "ftp://$FTP_HOST$FTP_DIR/$file"; then
              echo "  OK: $file"
              SUCCESS=$((SUCCESS+1))
            else
              echo "  FAIL: $file"
              FAIL=$((FAIL+1))
            fi
          done <<< "$FILTERED"

          echo "Uploaded: $SUCCESS | Failed: $FAIL"
          exit 0