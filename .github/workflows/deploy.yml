name: Deploy to Hostinger via FTPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTPS to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 153.92.11.34
          username: u895912460
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /
          timeout: 180000
          log-level: verbose
          dangerous-clean-slate: false
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/fix_*.js
            **/append_*.js
            **/rename_*.js
            **/add_*.js
            **/verify_*.js
            **/deploy_*.js
            **/data/users.json
            **/data/contest_wagers.json
            **/data/antibot.json
            **/data/site_settings.json
            **/data/gen_payouts.json

