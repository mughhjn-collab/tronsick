name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP (lftp passive mode)
        env:
          FTP_SERVER: 153.92.11.34
          FTP_USER: u895912460
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: /domains/tronsick.io/public_html/
        run: |
          lftp -c "
          set ftp:ssl-allow no;
          set net:max-retries 5;
          set net:reconnect-interval-base 5;
          set net:reconnect-interval-multiplier 1;
          set ftp:passive-mode true;
          open -u $FTP_USER,$FTP_PASS ftp://$FTP_SERVER;
          mirror --reverse --delete --verbose \
            --exclude-glob .git \
            --exclude-glob .github \
            --exclude-glob fix_*.js \
            --exclude-glob append_*.js \
            --exclude-glob rename_*.js \
            --exclude-glob add_*.js \
            --exclude-glob verify_*.js \
            --exclude-glob deploy_*.js \
            --exclude-glob data/users.json \
            --exclude-glob data/contest_wagers.json \
            --exclude-glob data/antibot.json \
            --exclude-glob data/site_settings.json \
            --exclude-glob data/gen_payouts.json \
            ./ $FTP_DIR;
          bye;
          "
