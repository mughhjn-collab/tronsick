name: Deploy to Hostinger via SFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SFTP (rsync over SSH)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='.github' --exclude='fix_*.js' --exclude='append_*.js' --exclude='rename_*.js' --exclude='add_*.js' --exclude='verify_*.js' --exclude='deploy_*.js' --exclude='push.js' --exclude='bump_version.ps1' --exclude='data/users.json' --exclude='data/contest_wagers.json' --exclude='data/antibot.json' --exclude='data/site_settings.json' --exclude='data/gen_payouts.json'
          path: ./
          remote_host: 153.92.11.34
          remote_port: 22
          remote_user: u895912460
          remote_pass: ${{ secrets.FTP_PASSWORD }}
          remote_path: /domains/tronsick.io/public_html/
